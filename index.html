<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>24 Hours of Heroes — CFNB 2026</title>
<style>
  * { -webkit-box-sizing: border-box; box-sizing: border-box; margin: 0; padding: 0; -webkit-text-size-adjust: 100%; }

  :root {
    --gold: #F5A623;
    --gold-dim: #B8791A;
    --gold-glow: rgba(245,166,35,0.15);
    --dark: #0D0D0D;
    --card: #1C1C1C;
    --border: rgba(255,255,255,0.08);
    --text: #E8E4DC;
    --muted: #7A7570;
    --cyan: #2EBFA5;
  }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-weight: 400;
    min-height: 100vh;
    overflow-x: hidden;
    padding-bottom: 40px;
  }

  /* HEADER */
  .hero {
    position: relative;
    padding: 40px 20px 32px;
    text-align: center;
    background: #0a0a0a;
    border-bottom: 1px solid var(--border);
    overflow: hidden;
  }
  .hero-eyebrow { font-size: 11px; letter-spacing: 4px; color: var(--gold); margin-bottom: 8px; text-transform: uppercase; }
  .hero-title {
    font-size: 72px;
    font-weight: 900;
    line-height: 0.88;
    color: var(--text);
    letter-spacing: -1px;
    text-transform: uppercase;
  }
  .hero-title { font-size: clamp(48px, 14vw, 88px); }
  .hero-title span { color: var(--gold); }
  .hero-sub { margin-top: 12px; font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
  .hero-date {
    display: inline-block;
    margin-top: 14px;
    background: var(--gold-glow);
    border: 1px solid var(--gold-dim);
    border-radius: 4px;
    padding: 5px 14px;
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--gold);
    text-transform: uppercase;
  }
  .hero-team {
    margin-top: 12px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 6px;
    color: var(--text);
    opacity: 0.5;
    text-transform: uppercase;
  }

  /* TABS */
  .tabs-wrap {
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    gap: 0;
    padding: 0 8px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    -ms-overflow-style: none;
    scrollbar-width: none;
    border-bottom: 1px solid var(--border);
    background: var(--dark);
  }
  .tabs-wrap::-webkit-scrollbar { display: none; }

  .tab-btn {
    -webkit-flex-shrink: 0;
    flex-shrink: 0;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 14px 16px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    min-height: 48px;
    -webkit-tap-highlight-color: transparent;
    -webkit-appearance: none;
  }
  .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

  /* PANELS */
  .person-panel { display: none; padding: 20px 16px 40px; max-width: 680px; margin: 0 auto; }
  .person-panel.active { display: block; }

  .person-header {
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-align: start;
    -webkit-align-items: flex-start;
    align-items: flex-start;
    -webkit-box-pack: justify;
    -webkit-justify-content: space-between;
    justify-content: space-between;
    -webkit-flex-wrap: wrap;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .person-name { font-size: clamp(34px, 8vw, 52px); font-weight: 900; letter-spacing: -1px; line-height: 1; color: var(--text); text-transform: uppercase; }
  .person-role { font-size: 11px; color: var(--muted); letter-spacing: 2px; margin-top: 4px; text-transform: uppercase; }
  .person-stats {
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    gap: 8px;
    -webkit-flex-wrap: wrap;
    flex-wrap: wrap;
    -webkit-box-align: center;
    -webkit-align-items: center;
    align-items: center;
  }
  .stat-pill { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; letter-spacing: 0.5px; }
  .stat-pill.wods { background: rgba(245,166,35,0.15); color: var(--gold); border: 1px solid rgba(245,166,35,0.3); }
  .stat-pill.solo { background: rgba(46,191,165,0.1); color: var(--cyan); border: 1px solid rgba(46,191,165,0.25); }

  /* WOD LIST */
  .wod-list { display: -webkit-box; display: -webkit-flex; display: flex; -webkit-box-orient: vertical; -webkit-flex-direction: column; flex-direction: column; gap: 10px; }

  .wod-item { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .wod-item.partner { border-left: 3px solid #7B5EA7; }
  .wod-item.team { border-left: 3px solid var(--cyan); }
  .wod-item.final { border-left: 3px solid var(--gold); }

  .wod-trigger {
    width: 100%;
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-align: center;
    -webkit-align-items: center;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
    background: none;
    border: none;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    min-height: 64px;
    -webkit-tap-highlight-color: transparent;
    -webkit-appearance: none;
  }

  .wod-num-badge {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    min-width: 30px;
    text-align: center;
    padding: 4px 6px;
    border-radius: 4px;
    background: var(--gold-glow);
    color: var(--gold);
    border: 1px solid rgba(245,166,35,0.2);
    -webkit-flex-shrink: 0;
    flex-shrink: 0;
  }
  .wod-time-badge {
    font-size: 17px;
    font-weight: 900;
    letter-spacing: 0;
    color: var(--text);
    min-width: 46px;
    -webkit-flex-shrink: 0;
    flex-shrink: 0;
  }
  .wod-info { -webkit-flex: 1 1 auto; flex: 1 1 auto; min-width: 0; }
  .wod-title-line { font-size: 15px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .wod-honour { font-size: 11px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .wod-right {
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-align: center;
    -webkit-align-items: center;
    align-items: center;
    gap: 6px;
    -webkit-flex-shrink: 0;
    flex-shrink: 0;
  }
  .wod-cap-badge { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 20px; background: rgba(46,191,165,0.1); color: var(--cyan); border: 1px solid rgba(46,191,165,0.2); white-space: nowrap; }
  .wod-type-tag { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 20px; white-space: nowrap; }
  .wod-type-tag.partner { background: rgba(123,94,167,0.15); color: #B59FD8; border: 1px solid rgba(123,94,167,0.3); }
  .wod-type-tag.team { background: rgba(46,191,165,0.1); color: var(--cyan); border: 1px solid rgba(46,191,165,0.25); }
  .wod-type-tag.final { background: var(--gold-glow); color: var(--gold); border: 1px solid rgba(245,166,35,0.3); }
  .wod-chevron { font-size: 9px; color: var(--muted); -webkit-transition: -webkit-transform 0.25s; transition: transform 0.25s; }
  .wod-item.open .wod-chevron { -webkit-transform: rotate(180deg); transform: rotate(180deg); }

  /* WOD DETAIL */
  .wod-detail { max-height: 0; overflow: hidden; -webkit-transition: max-height 0.35s ease; transition: max-height 0.35s ease; }
  .wod-detail-inner { padding: 0 16px 18px; border-top: 1px solid var(--border); }

  .detail-section { margin-top: 14px; }
  .detail-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
  .detail-scheme { font-size: 18px; font-weight: 900; letter-spacing: 0; color: var(--gold); line-height: 1.2; text-transform: uppercase; }

  .movement-list { list-style: none; margin-top: 8px; }
  .movement-list li {
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-align: start;
    -webkit-align-items: flex-start;
    align-items: flex-start;
    gap: 8px;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    line-height: 1.45;
    color: var(--text);
  }
  .movement-list li:last-child { border-bottom: none; }
  .movement-list li::before { content: '—'; color: var(--gold-dim); -webkit-flex-shrink: 0; flex-shrink: 0; margin-top: 1px; }

  .detail-grid { display: -webkit-box; display: -webkit-flex; display: flex; -webkit-flex-wrap: wrap; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .detail-chip { -webkit-flex: 1 1 140px; flex: 1 1 140px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; font-size: 12px; color: var(--muted); line-height: 1.5; }
  .detail-chip.full { -webkit-flex-basis: 100%; flex-basis: 100%; }
  .detail-chip strong { display: block; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; font-weight: 700; }
  .detail-chip span { color: var(--text); font-size: 13px; }
  .detail-note { margin-top: 10px; padding: 8px 10px; background: rgba(245,166,35,0.05); border: 1px solid rgba(245,166,35,0.15); border-radius: 6px; font-size: 12px; color: var(--gold-dim); line-height: 1.5; }

  /* LEGEND + FOOTER */
  .legend {
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    gap: 16px;
    -webkit-flex-wrap: wrap;
    flex-wrap: wrap;
    padding: 14px 16px;
    border-top: 1px solid var(--border);
    -webkit-box-pack: center;
    -webkit-justify-content: center;
    justify-content: center;
  }
  .legend-item {
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-align: center;
    -webkit-align-items: center;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
  }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; -webkit-flex-shrink: 0; flex-shrink: 0; }
  .footer { text-align: center; padding: 20px; font-size: 11px; color: var(--muted); letter-spacing: 1px; border-top: 1px solid var(--border); }

  @media (max-width: 480px) {
    .wod-cap-badge, .wod-type-tag { display: none; }
  }
</style>
</head>

    if (ALL_WODS[person.wods[s]].type === 'solo') soloCount++;
  }

  var html = '<div class="person-panel' + (idx === 0 ? ' active' : '') + '" id="panel-' + idx + '">';
  html += '<div class="person-header">';
  html += '<div><div class="person-name">' + person.label + '</div><div class="person-role">' + person.slot + '</div></div>';
  html += '<div class="person-stats"><span class="stat-pill wods">' + wodCount + ' WODs</span><span class="stat-pill solo">' + soloCount + ' Solo</span></div>';
  html += '</div>';
  html += '<div class="wod-list">';

  for (var i = 0; i < person.wods.length; i++) {
    var id = person.wods[i];
    var w = ALL_WODS[id];
    var typeClass = w.type === 'partner' ? 'partner' : w.type === 'team' ? 'team' : w.type === 'final' ? 'final' : '';
    var typeLabel = w.type === 'partner' ? 'Partner' : w.type === 'team' ? 'Team of 4' : w.type === 'final' ? 'All Members' : '';

    var movements = '';
    for (var m = 0; m < w.movements.length; m++) {
      movements += '<li>' + w.movements[m] + '</li>';
    }

    html += '<div class="wod-item ' + typeClass + '" id="wod-' + idx + '-' + id + '">';
    html += '<button class="wod-trigger" onclick="toggleWod(\'' + idx + '-' + id + '\')">';
    html += '<span class="wod-num-badge">#' + w.num + '</span>';
    html += '<span class="wod-time-badge">' + w.time + '</span>';
    html += '<div class="wod-info"><div class="wod-title-line">' + w.name + '</div><div class="wod-honour">In honour of ' + w.honour + '</div></div>';
    html += '<div class="wod-right">';
    if (typeLabel) html += '<span class="wod-type-tag ' + typeClass + '">' + typeLabel + '</span>';
    html += '<span class="wod-cap-badge">' + w.cap + '</span>';
    html += '<span class="wod-chevron">&#9660;</span>';
    html += '</div>';
    html += '</button>';
    html += '<div class="wod-detail" id="detail-' + idx + '-' + id + '">';
    html += '<div class="wod-detail-inner">';
    html += '<div class="detail-section"><div class="detail-label">Scheme</div><div class="detail-scheme">' + w.scheme + '</div></div>';
    html += '<div class="detail-section"><div class="detail-label">Movements</div><ul class="movement-list">' + movements + '</ul></div>';
    html += '<div class="detail-grid">';
    html += '<div class="detail-chip"><strong>Equipment</strong><span>' + w.equipment + '</span></div>';
    html += '<div class="detail-chip"><strong>Time Cap</strong><span>' + w.cap + '</span></div>';
    html += '<div class="detail-chip full"><strong>Scaling</strong><span>' + w.scaling + '</span></div>';
    html += '</div>';
    if (w.note) html += '<div class="detail-note">&#9432; ' + w.note + '</div>';
    html += '</div></div></div>';
  }

  html += '</div></div>';
  return html;
}

for (var p = 0; p < PEOPLE.length; p++) {
  var btn = document.createElement('button');
  btn.className = 'tab-btn' + (p === 0 ? ' active' : '');
  btn.textContent = PEOPLE[p].label;
  btn.setAttribute('data-idx', p);
  btn.onclick = function() {
    var idx = parseInt(this.getAttribute('data-idx'));
    showPerson(idx);
  };
  tabsEl.appendChild(btn);
}

var allPanelsHTML = '';
for (var p = 0; p < PEOPLE.length; p++) {
  allPanelsHTML += buildPanel(PEOPLE[p], p);
}
panelsEl.innerHTML = allPanelsHTML;

}); // end DOMContentLoaded

function showPerson(idx) {
  var panels = document.querySelectorAll('.person-panel');
  var btns = document.querySelectorAll('.tab-btn');
  for (var i = 0; i < panels.length; i++) {
    if (i === idx) {
      panels[i].className = 'person-panel active';
      btns[i].className = 'tab-btn active';
    } else {
      panels[i].className = 'person-panel';
      btns[i].className = 'tab-btn';
    }
  }
  btns[idx].scrollIntoView({ block: 'nearest', inline: 'center' });
  window.scrollTo(0, 0);
}

function toggleWod(key) {
  var item = document.getElementById('wod-' + key);
  var detail = document.getElementById('detail-' + key);
  if (!item || !detail) return;
  var isOpen = item.className.indexOf('open') !== -1;
  if (isOpen) {
    item.className = item.className.replace(' open', '');
    detail.style.maxHeight = '0';
  } else {
    item.className += ' open';
    detail.style.maxHeight = (detail.scrollHeight + 200) + 'px';
  }
}
</script>
</body>
</html>
